# gitleaks config for wood-fired-tasks
# Inherits all default rules from gitleaks v8.x; only adds allowlists
# for known false positives (test fixtures, documentation placeholders,
# and internal planning docs that ship outside the npm tarball).
#
# Rationale per entry is documented next to the regex/path so future
# maintainers know why it was added (task #256).

[extend]
useDefault = true

[allowlist]
description = "wood-fired-tasks false-positive allowlist (see task #256)"

paths = [
  # Internal planning workspaces — never published to npm, not part of
  # the OSS surface area; keep gitleaks from re-scanning them on every
  # PR. (.gitignore already excludes most, but a few historical commits
  # touched .codex/ planning docs.)
  '''(^|/)\.codex/''',
  '''(^|/)\.planning/''',
  '''(^|/)\.agents/''',
  # CHANGELOG entries reference task IDs and short SHA prefixes that
  # occasionally trip the generic-api-key heuristic.
  '''^CHANGELOG\.md$''',
  # Local gitleaks JSON report — never tracked, but allowlist it
  # defensively in case it ever lands in a transient working copy.
  '''^\.gitleaks-report\.json$''',
]

regexes = [
  # Deterministic test fixture used across auth + swagger tests to
  # exercise the 32-character key validator. Sequential, no entropy,
  # never used outside test files. (task #256 finding 1-5)
  '''k1a2b3c4d5e6f7g8h9i0j1k2l3m4n5o6?''',
  # Test-only API key constant used by comments.test.ts and
  # dependencies.test.ts. (task #256 finding 7-8)
  '''test-api-key-12345''',
  # Documentation placeholder in docs/API.md curl example.
  # (task #256 finding 6)
  '''your-key-here''',
  # Slack placeholder tokens shown in .env.example / SETUP docs.
  '''xoxb-your-bot-token-here''',
  '''xapp-your-app-token-here''',
  '''xoxb-EXAMPLE-NOT-A-REAL-TOKEN''',
  # JS identifiers used as test-fixture variable names in session /
  # env tests. Each is a `Buffer.alloc(N).toString('base64')` constant
  # bound to a JS identifier; gitleaks flags the mixed-case +
  # digit-suffix IDENTIFIER itself as generic-api-key (entropy 3.5),
  # not the actual base64 payload. Never appears outside test files.
  # (2026-05-24 — 8 historic findings across cfa480d / 919d2f9 /
  # a5c0a7c in session-plugins / env / pages / tokens-mint-html tests.)
  '''validSecret32''',
  '''tooShortSecret31''',
  '''tooLongSecret33''',
  # Test PAT fixtures matching <prefix>_pat_<obvious-placeholder> in auth
  # tests (device-flow, credentials, device-token). The prefix `wft_pat_`
  # is the project's real PAT format (renamed from `wfb_pat_` in the
  # project-13 rename) — only the specific placeholder bodies are
  # allowlisted, NOT the prefix itself, so a real `wft_pat_<random-hex>`
  # accidentally landing in a test still trips the gate. Both prefixes are
  # listed because the full-history scan still sees the pre-rename
  # `wfb_pat_` fixtures in historic commits. (2026-05-24 — 3 historic
  # findings across 079d033 / b80606b / be54656; renamed 2026-05-25.)
  '''wfb_pat_secret123''',
  '''wfb_pat_ABCDEFG1234567890''',
  '''wfb_pat_MINTED1234567890ABCDEFGHIJKLMNOP''',
  '''wft_pat_secret123''',
  '''wft_pat_ABCDEFG1234567890''',
  '''wft_pat_MINTED1234567890ABCDEFGHIJKLMNOP''',
  # Documentation placeholder PATs in the v2.0 Bearer-PAT curl examples
  # (docs/API.md, MCP.md, SETUP.md, etc.) introduced when the X-API-Key auth
  # docs were scrubbed to Bearer-PAT (#817). The `curl-auth-header` default
  # rule flags `Authorization: Bearer <token>` in curl examples; these bodies
  # are obvious non-secret placeholders, not real tokens. As above, only the
  # specific placeholder bodies are allowlisted — never the bare `wft_pat_`
  # prefix — so a real `wft_pat_<random>` accidentally committed still trips.
  '''wft_pat_your-token(-here)?''',
  '''wft_pat_your-dev-token''',
  '''wft_pat_dev-token''',
  '''wft_pat_X{10,}''',
]

stopwords = [
  "example",
  "placeholder",
  "your-api-key",
  "your-key-here",
  "test-api-key",
]
