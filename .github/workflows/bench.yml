name: Benchmarks

# task #212: vitest bench suite for hot-path perf regression.
#
# IMPORTANT — perf benchmarks are flaky on shared runners; nightly results are
# advisory and not PR-blocking. This workflow:
#   * Always runs on `schedule` (nightly) and `workflow_dispatch`.
#   * Runs on PRs ONLY when the `bench` label is applied, so contributors can
#     opt-in to a perf snapshot without paying the cost on every PR.
#   * Uploads the captured bench output as an artifact for trend inspection.
#   * NEVER fails the build on perf regression — `npm run test:bench` exits
#     non-zero only if vitest itself errors. The bench files use soft ceilings.
on:
  schedule:
    # Nightly at 07:00 UTC (offset from mutation.yml's 06:00 to avoid contention).
    - cron: '0 7 * * *'
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read

jobs:
  bench:
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'bench'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run vitest benchmarks (advisory, never PR-blocking)
        run: npm run test:bench | tee bench-output.txt
      - name: Upload bench output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench-output
          path: bench-output.txt
          if-no-files-found: warn
          retention-days: 30
