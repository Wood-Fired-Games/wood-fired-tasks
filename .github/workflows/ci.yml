name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# F1: least-privilege token. Every job here only reads the checkout to run
# lint/test/build/audit — none write to the repo, post statuses, or publish.
permissions:
  contents: read

# F2: cancel superseded runs on the same ref to save runner minutes when a
# new commit lands. Keyed on workflow + ref so concurrent unrelated workflows
# are unaffected; a completed run still reports its required checks.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      # Tests assert on packaged assets (dist/skills/tasks, dist/skills/agents)
      # resolved via the asset resolver, so dist/ must be built first.
      - run: npm run build
      - run: npm test

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      # Same as the test job: coverage exercises tests that read packaged
      # dist/skills assets via the resolver, so dist/ must exist first.
      - run: npm run build
      - name: Run tests with coverage (fails when thresholds drop)
        run: npm run test:coverage

  deps:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Check unused dependencies
        run: npx knip --dependencies

  depcruise:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Check import boundaries and cycles (dependency-cruiser)
        run: npm run depcruise

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Lint (biome check)
        run: npm run lint
      - name: Format check (biome format, fails on unformatted files)
        run: npm run format:check
      - name: Escape-hatch budget (fail on new unexplained production casts)
        run: node scripts/quality/escape-hatch-budget.mjs

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Build (tsc)
        run: npm run build

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Audit production dependencies (fail on high/critical)
        run: npm audit --omit=dev --audit-level=high

  # ADVISORY ONLY — this job reports the cognitive-complexity outliers for the
  # production TypeScript surface but is NOT a merge gate. continue-on-error
  # keeps it from ever blocking a PR; calibration + per-outlier disposition
  # lives in docs/CODE_QUALITY_ROADMAP.md ("Complexity Calibration"). Promote
  # to a real gate only after the report has been reviewed (task #771 deferred
  # gating deliberately). Not in the required-checks set.
  complexity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Cognitive-complexity report (advisory, never fails)
        run: npm run quality:complexity

  agent-context:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Verify agent context manifest, links, and budgets
        run: npm run agent-context:check

  vendor-neutrality:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Vendor-neutrality gate (forbid vendor names in router core)
        run: npm run check:vendor-neutrality

  pack-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Build (tsc)
        run: npm run build
      - name: Pack the router package and validate tarball contents
        working-directory: packages/wft-router
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          expected="wood-fired-games-wft-router-${version}.tgz"
          # npm flattens the scope: @wood-fired-games/wft-router -> wood-fired-games-wft-router-<version>.tgz
          produced="$(npm pack | tail -n1)"
          echo "npm pack produced: ${produced}"
          if [ "${produced}" != "${expected}" ]; then
            echo "::error::tarball name mismatch: expected ${expected}, got ${produced}"
            exit 1
          fi
          contents="$(tar -tzf "${expected}")"
          echo "${contents}"
          for required in \
            "package/package.json" \
            "package/dist/bin/wft-router.js" \
            "package/dist/index.js" \
            "package/README.md"; do
            if ! printf '%s\n' "${contents}" | grep -qx "${required}"; then
              echo "::error::tarball missing required entry: ${required}"
              exit 1
            fi
          done
          rm -f "${expected}"

  oci-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up QEMU (multi-arch emulation for the arm64 build)
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build wft-router OCI image (multi-arch, no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: packages/wft-router/Containerfile
          platforms: linux/amd64,linux/arm64
          push: false
          load: false

  host-manifests:
    # Validates the example host-platform service manifests under
    # packages/wft-router/host-manifests/. These are EXAMPLES with placeholder
    # install paths, so the checks below tolerate "binary missing" warnings
    # while still failing on a genuinely malformed directive.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify systemd unit (tolerate placeholder ExecStart only)
        run: |
          # GitHub's default step shell runs with errexit (`bash -e`). This
          # script does its OWN exit-code handling on systemd-analyze — a
          # non-zero rc is EXPECTED (the unit ships a placeholder ExecStart) —
          # so errexit must be OFF or the `out=$(...)` assignment aborts the
          # step before the residual-filtering logic ever runs.
          set +e -uo pipefail
          unit=packages/wft-router/host-manifests/systemd/wft-router.service
          # systemd-analyze verify exits non-zero on directive errors AND on a
          # non-existent ExecStart binary. The unit ships an intentional
          # placeholder path (/usr/local/bin/wft-router), so we treat ONLY the
          # "is not executable: No such file or directory" line as benign and
          # fail on anything else.
          out="$(systemd-analyze verify "$unit" 2>&1)"; rc=$?
          echo "$out"
          if [ "$rc" -eq 0 ]; then
            echo "systemd-analyze verify: clean"
            exit 0
          fi
          # Drop the expected placeholder-binary lines; if nothing else remains,
          # the unit is well-formed and we pass.
          residual="$(printf '%s\n' "$out" \
            | grep -v 'is not executable: No such file or directory' \
            | grep -v '^[[:space:]]*$' || true)"
          if [ -z "$residual" ]; then
            echo "::notice::only the expected placeholder-ExecStart warning was emitted; unit is well-formed"
            exit 0
          fi
          echo "::error::systemd-analyze verify reported a real problem:"
          printf '%s\n' "$residual"
          exit 1
      - name: Lint launchd plist (plistlib; plutil is macOS-only)
        run: |
          python3 -c "import plistlib,sys; plistlib.load(open(sys.argv[1],'rb')); print('PLIST_OK')" \
            packages/wft-router/host-manifests/launchd/com.wood-fired-games.wft-router.plist
      - name: Windows service README present
        run: test -f packages/wft-router/host-manifests/windows/README.md
