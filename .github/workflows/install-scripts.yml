name: Install Scripts

on:
  # Wood-fired-tasks #340 made cli-smoke-link / cli-surface-coverage-link /
  # cli-tarball-install / cli-e2e REQUIRED status checks on branch protection
  # for main. A required check that never fires (because a paths filter
  # skipped the workflow) permanently blocks the merge under classic branch
  # protection. The original install-scripts.yml `paths:` filter was therefore
  # removed so EVERY PR triggers the workflow and every required check is
  # reported. CI cost is ~3-4 minutes extra per PR; cheap insurance against
  # the bug class wood-fired-tasks@1.0.0 shipped with.
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Note on workflow security: this workflow is scoped to lint + smoke-test
# the installer scripts only. It does not consume any untrusted input
# fields (issue titles, PR bodies, commit messages) in shell commands.

# F1: least-privilege token. This workflow only reads the checkout; it
# never writes to the repo, posts statuses, or uploads release assets.
permissions:
  contents: read

# F2: cancel superseded runs on the same ref to save runner minutes when a
# new commit lands. Pattern copied from mutation.yml's concurrency block,
# keyed on workflow + ref so concurrent unrelated workflows are unaffected.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # Lint install.sh with shellcheck. Fails on any errors OR warnings —
  # install.sh ships to end users so we want it clean.
  # -------------------------------------------------------------------------
  shellcheck:
    name: shellcheck install.sh
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck --version
      - name: Run shellcheck on install.sh only
        # Explicitly scope to install.sh — task 202's scope is the installer only.
        # Using the action would scan all .sh files in the repo by default.
        run: shellcheck -S warning install.sh

  # -------------------------------------------------------------------------
  # Lint the production deploy scripts. install.sh (root-level) provisions
  # the operator's Claude Code config; deploy/install.sh provisions the
  # host (service user, systemd unit) and deploy/upgrade.sh ships builds
  # in place. All three must pass shellcheck -S warning so a bad change
  # cannot land silently. Task #325 introduced the split.
  # -------------------------------------------------------------------------
  shellcheck-deploy:
    name: shellcheck deploy/*.sh
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck --version
      - name: Run shellcheck on deploy/install.sh and deploy/upgrade.sh
        run: shellcheck -S warning deploy/install.sh deploy/upgrade.sh
      - name: Verify both scripts parse as valid bash (bash -n)
        run: |
          bash -n deploy/install.sh
          bash -n deploy/upgrade.sh
      - name: Verify deploy/upgrade.sh is executable
        run: test -x deploy/upgrade.sh

  # -------------------------------------------------------------------------
  # Lint the full client-package bundle's POSIX shell scripts. The client
  # package (distributed as wood-fired-tasks-client.zip by
  # scripts/build-client-package.sh) ships setup.sh + uninstall.sh to end
  # users on Linux/macOS, so both must pass shellcheck -S warning exactly
  # like the root installer. scripts/build-client-package.sh is the producer
  # of that bundle and is linted here too so a bad change to the packaging
  # script cannot land silently. Task #386 introduced this coverage.
  #
  # The bundle's Windows/DOS surfaces are linted by the psscriptanalyzer
  # job (setup.ps1, uninstall.ps1). The .bat shims (setup.bat, uninstall.bat)
  # have NO linter in this repo — there is no batch-file static analyzer in
  # the toolchain — so they are intentionally not gated here; they are thin
  # launchers that delegate to the .ps1 scripts.
  # -------------------------------------------------------------------------
  shellcheck-client-package:
    name: shellcheck client-package/*.sh
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck --version
      - name: Run shellcheck on the client-package bundle scripts
        # setup.sh + uninstall.sh ship to end users; build-client-package.sh
        # produces the bundle. All three must be clean at -S warning.
        run: shellcheck -S warning client-package/setup.sh client-package/uninstall.sh scripts/build-client-package.sh
      - name: Verify all three scripts parse as valid bash (bash -n)
        run: |
          bash -n client-package/setup.sh
          bash -n client-package/uninstall.sh
          bash -n scripts/build-client-package.sh
      - name: Verify uninstall.sh is executable
        # setup.sh is intentionally tracked non-executable (mode 0644);
        # scripts/build-client-package.sh chmod +x's it into the bundle and
        # the docs invoke it as `bash setup.sh`. Only uninstall.sh ships
        # with the executable bit set in-tree, so only it is gated here.
        run: test -x client-package/uninstall.sh

  # -------------------------------------------------------------------------
  # Lint install.ps1 with PSScriptAnalyzer on a Windows runner.
  # The installer is intentionally interactive (Write-Host w/ colors), so
  # we only fail on Errors here — the noisy Write-Host warnings are
  # accepted-by-design for an installer that talks to a human. Real bugs
  # (e.g. unused variable assignments) have been fixed in-source.
  # -------------------------------------------------------------------------
  psscriptanalyzer:
    name: PSScriptAnalyzer install.ps1
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run PSScriptAnalyzer
        shell: pwsh
        # Lint the root installer AND the client-package bundle's PowerShell
        # surfaces (setup.ps1 + uninstall.ps1), which ship to Windows end
        # users via wood-fired-tasks-client.zip. Task #386 extended coverage
        # from install.ps1 alone to the full bundle. Severity stays Error:
        # these installers are intentionally interactive (Write-Host w/
        # colors), so the noisy informational/warning rules are accepted by
        # design; only real Errors fail the build.
        run: |
          $targets = @(
            'install.ps1',
            'client-package/setup.ps1',
            'client-package/uninstall.ps1'
          )
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
            Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck
          }
          Import-Module PSScriptAnalyzer
          $failed = $false
          foreach ($t in $targets) {
            if (-not (Test-Path $t)) {
              Write-Error "PSScriptAnalyzer target not found: $t"
              $failed = $true
              continue
            }
            $results = Invoke-ScriptAnalyzer -Path $t -Severity Error
            if ($results) {
              $results | Format-Table -AutoSize
              Write-Error "PSScriptAnalyzer reported $($results.Count) error(s) in $t"
              $failed = $true
            } else {
              Write-Host "PSScriptAnalyzer: no errors in $t"
            }
          }
          if ($failed) { exit 1 }

  # -------------------------------------------------------------------------
  # Smoke-test install.sh on Linux + macOS.
  #
  # install.sh does not download a release artifact — it wires up Claude
  # Code skill files and an MCP server entry in ~/.claude.json that points
  # at the local checkout's dist/mcp/index.js. Since task #258 split the
  # installer into local (default) vs remote modes, this job exercises both:
  #
  #   Local mode (default):
  #     1. run install.sh — should NOT prompt, NOT read WOOD_FIRED_TASKS_API_KEY
  #     2. assert ~/.claude.json's 'wood-fired-tasks' MCP entry has DATABASE_PATH
  #     3. assert that entry has NO WFT_API_KEY / WOOD_FIRED_TASKS_API_KEY env
  #     4. assert no secret file was written (local mode never touches it)
  #
  #   Remote mode:
  #     1. run install.sh --mode remote with WOOD_FIRED_TASKS_API_KEY env var
  #     2. assert ~/.claude.json's 'wood-fired-tasks-remote' MCP entry has
  #        WFT_API_URL + WFT_API_KEY
  #     3. assert secret file is mode 0600
  #
  # Alpine / Debian / Fedora are intentionally skipped — they would
  # multiply runner minutes without testing behaviour that differs from
  # ubuntu-latest at the install.sh layer. The only OS-specific code paths
  # in install.sh are `stat -c` (Linux) vs `stat -f` (macOS), which the
  # ubuntu + macos matrix legs already cover.
  # -------------------------------------------------------------------------
  smoke-unix:
    name: smoke install.sh (${{ matrix.os }})
    needs: shellcheck
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install jq (macOS)
        if: runner.os == 'macOS'
        run: brew install jq

      - name: Verify prerequisites
        run: |
          jq --version
          curl --version | head -1

      - name: Build local artifacts (dist/mcp/index.js, dist/mcp/remote/index.js)
        run: |
          npm ci
          npm run build
          test -f dist/mcp/index.js || { echo "build did not produce dist/mcp/index.js"; exit 1; }
          test -f dist/mcp/remote/index.js || { echo "build did not produce dist/mcp/remote/index.js"; exit 1; }

      # ----- LOCAL MODE -----------------------------------------------------
      - name: Run install.sh in local mode (default) — even with API key env set, it must be ignored
        env:
          # Intentionally set the env var: local mode must silently ignore it
          # so existing users who leave it exported don't end up with a key
          # in ~/.claude.json. Task #258.
          WOOD_FIRED_TASKS_API_KEY: ci-smoke-test-key-must-NOT-leak-into-config
          # Skip the health probe — no service is running in CI.
          WOOD_FIRED_TASKS_URL: http://127.0.0.1:1
        run: bash install.sh

      - name: Assert skill files were copied (local)
        run: |
          dest="$HOME/.claude/commands/tasks"
          test -d "$dest" || { echo "skills dest dir missing: $dest"; exit 1; }
          count=$(find "$dest" -maxdepth 1 -name "*.md" -type f | wc -l)
          echo "found $count skill files in $dest"
          test "$count" -ge 1 || { echo "no skill files were copied"; exit 1; }

      - name: Assert local MCP entry has DATABASE_PATH and NO API key
        run: |
          test -f "$HOME/.claude.json" || { echo "~/.claude.json missing"; exit 1; }
          jq -e '.mcpServers["wood-fired-tasks"].command == "node"' "$HOME/.claude.json" >/dev/null
          jq -e '.mcpServers["wood-fired-tasks"].args[0] | startswith("/") and endswith("/dist/mcp/index.js")' "$HOME/.claude.json" >/dev/null
          jq -e '.mcpServers["wood-fired-tasks"].env.DATABASE_PATH | startswith("/") and endswith("/data/tasks.db")' "$HOME/.claude.json" >/dev/null
          jq -e '.mcpServers["wood-fired-tasks"] | has("cwd") | not' "$HOME/.claude.json" >/dev/null
          # Task #258: local MCP must NOT carry any API key in its env.
          jq -e '.mcpServers["wood-fired-tasks"].env | has("WFT_API_KEY") | not' "$HOME/.claude.json" >/dev/null
          jq -e '.mcpServers["wood-fired-tasks"].env | has("WOOD_FIRED_TASKS_API_KEY") | not' "$HOME/.claude.json" >/dev/null
          echo "local MCP entry has DATABASE_PATH and no API key — OK"

      - name: Assert no secret file written by local mode
        run: |
          secret="${XDG_CONFIG_HOME:-$HOME/.config}/wood-fired-tasks/api-key"
          if [ -f "$secret" ]; then
            echo "ERROR: local mode wrote $secret — it must not"
            exit 1
          fi
          echo "no secret file present after local install — OK"

      - name: Assert install.sh --help exits 0
        run: bash install.sh --help

      # ----- REMOTE MODE ----------------------------------------------------
      - name: Run install.sh --mode remote with env-var API key
        env:
          WOOD_FIRED_TASKS_API_KEY: ci-smoke-test-key-not-a-real-secret
          WOOD_FIRED_TASKS_URL: http://127.0.0.1:1
        run: bash install.sh --mode remote

      - name: Assert remote MCP entry has WFT_API_URL + WFT_API_KEY
        run: |
          jq -e '.mcpServers["wood-fired-tasks-remote"].command == "node"' "$HOME/.claude.json" >/dev/null
          jq -e '.mcpServers["wood-fired-tasks-remote"].args[0] | startswith("/") and endswith("/dist/mcp/remote/index.js")' "$HOME/.claude.json" >/dev/null
          jq -e '.mcpServers["wood-fired-tasks-remote"] | has("cwd") | not' "$HOME/.claude.json" >/dev/null
          jq -e '.mcpServers["wood-fired-tasks-remote"].env.WFT_API_KEY | length > 0' "$HOME/.claude.json" >/dev/null
          jq -e '.mcpServers["wood-fired-tasks-remote"].env.WFT_API_URL | length > 0' "$HOME/.claude.json" >/dev/null
          echo "remote MCP entry present and well-formed"

      - name: Assert secret file permissions are 0600 (remote)
        run: |
          secret="${XDG_CONFIG_HOME:-$HOME/.config}/wood-fired-tasks/api-key"
          test -f "$secret" || { echo "secret file missing: $secret"; exit 1; }
          mode=$(stat -c '%a' "$secret" 2>/dev/null || stat -f '%Lp' "$secret")
          echo "secret file mode: $mode"
          test "$mode" = "600" || { echo "expected 600, got $mode"; exit 1; }

      - name: Assert install.sh rejects invalid --mode
        run: |
          if bash install.sh --mode bogus 2>/dev/null; then
            echo "ERROR: install.sh accepted --mode bogus"
            exit 1
          fi
          echo "install.sh rejected --mode bogus — OK"

  # -------------------------------------------------------------------------
  # Smoke-test install.ps1 on Windows.
  #
  # Mirrors smoke-unix: build dist/ locally, exercise both local (default,
  # no API key) and remote (-Mode remote, env-var API key) install paths,
  # then assert ~/.claude.json + (remote only) secret file landed correctly.
  # Task #258 split the installer into the two modes.
  # -------------------------------------------------------------------------
  smoke-windows:
    name: smoke install.ps1 (windows-latest)
    needs: psscriptanalyzer
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Build local artifacts (dist/mcp/index.js, dist/mcp/remote/index.js)
        shell: pwsh
        run: |
          npm ci
          npm run build
          if (-not (Test-Path 'dist/mcp/index.js')) {
            Write-Error "build did not produce dist/mcp/index.js"
            exit 1
          }
          if (-not (Test-Path 'dist/mcp/remote/index.js')) {
            Write-Error "build did not produce dist/mcp/remote/index.js"
            exit 1
          }

      # ----- LOCAL MODE (default) ------------------------------------------
      - name: Run install.ps1 in local mode (default) — API key env var must be ignored
        shell: pwsh
        env:
          # Intentionally set: local mode must silently drop it. Task #258.
          WOOD_FIRED_TASKS_API_KEY: ci-smoke-test-key-must-NOT-leak-into-config
          WOOD_FIRED_TASKS_URL: http://127.0.0.1:1
        run: ./install.ps1

      - name: Assert skill files were copied (local)
        shell: pwsh
        run: |
          $dest = Join-Path $env:USERPROFILE '.claude\commands\tasks'
          if (-not (Test-Path $dest)) { Write-Error "skills dest dir missing: $dest"; exit 1 }
          $count = (Get-ChildItem -Path $dest -Filter '*.md' -File).Count
          Write-Host "found $count skill files in $dest"
          if ($count -lt 1) { Write-Error "no skill files were copied"; exit 1 }

      - name: Assert local MCP entry has DATABASE_PATH and NO API key
        shell: pwsh
        run: |
          $cfg = Join-Path $env:USERPROFILE '.claude.json'
          if (-not (Test-Path $cfg)) { Write-Error "$cfg missing"; exit 1 }
          $json = Get-Content $cfg -Raw | ConvertFrom-Json
          $entry = $json.mcpServers.'wood-fired-tasks'
          if ($entry.command -ne 'node') { Write-Error "local MCP command mismatch"; exit 1 }
          # args[0] must be an ABSOLUTE path ending in dist/mcp/index.js — Claude
          # Code ignores the `cwd` field, so a relative path breaks the MCP server.
          if (-not ([System.IO.Path]::IsPathRooted($entry.args[0]))) { Write-Error "local MCP args[0] not absolute: $($entry.args[0])"; exit 1 }
          if (-not ($entry.args[0] -like '*dist\mcp\index.js' -or $entry.args[0] -like '*dist/mcp/index.js')) { Write-Error "local MCP args[0] mismatch: $($entry.args[0])"; exit 1 }
          if (-not ([System.IO.Path]::IsPathRooted($entry.env.DATABASE_PATH))) { Write-Error "DATABASE_PATH not absolute: $($entry.env.DATABASE_PATH)"; exit 1 }
          if ($entry.PSObject.Properties.Name -contains 'cwd') { Write-Error "local MCP entry contains cwd — Claude Code ignores it; installer must not write it"; exit 1 }
          if ($entry.env.PSObject.Properties.Name -contains 'WFT_API_KEY') {
            Write-Error "local MCP entry contains WFT_API_KEY — task #258 forbids this"
            exit 1
          }
          if ($entry.env.PSObject.Properties.Name -contains 'WOOD_FIRED_TASKS_API_KEY') {
            Write-Error "local MCP entry contains WOOD_FIRED_TASKS_API_KEY — task #258 forbids this"
            exit 1
          }
          Write-Host "local MCP entry has DATABASE_PATH and no API key — OK"

      - name: Assert no secret file written by local mode
        shell: pwsh
        run: |
          $secret = Join-Path $env:LOCALAPPDATA 'wood-fired-tasks\api-key'
          if (Test-Path $secret) {
            Write-Error "local mode wrote $secret — it must not"
            exit 1
          }
          Write-Host "no secret file present after local install — OK"

      # ----- REMOTE MODE ---------------------------------------------------
      - name: Run install.ps1 -Mode remote with env-var API key
        shell: pwsh
        env:
          WOOD_FIRED_TASKS_API_KEY: ci-smoke-test-key-not-a-real-secret
          WOOD_FIRED_TASKS_URL: http://127.0.0.1:1
        run: ./install.ps1 -Mode remote

      - name: Assert remote MCP entry has WFT_API_URL + WFT_API_KEY
        shell: pwsh
        run: |
          $cfg = Join-Path $env:USERPROFILE '.claude.json'
          $json = Get-Content $cfg -Raw | ConvertFrom-Json
          $entry = $json.mcpServers.'wood-fired-tasks-remote'
          if ($entry.command -ne 'node') { Write-Error "remote MCP command mismatch"; exit 1 }
          if (-not ([System.IO.Path]::IsPathRooted($entry.args[0]))) { Write-Error "remote MCP args[0] not absolute: $($entry.args[0])"; exit 1 }
          if (-not ($entry.args[0] -like '*dist\mcp\remote\index.js' -or $entry.args[0] -like '*dist/mcp/remote/index.js')) { Write-Error "remote MCP args[0] mismatch: $($entry.args[0])"; exit 1 }
          if ($entry.PSObject.Properties.Name -contains 'cwd') { Write-Error "remote MCP entry contains cwd — Claude Code ignores it; installer must not write it"; exit 1 }
          if ([string]::IsNullOrWhiteSpace($entry.env.WFT_API_KEY)) { Write-Error "WFT_API_KEY missing"; exit 1 }
          if ([string]::IsNullOrWhiteSpace($entry.env.WFT_API_URL)) { Write-Error "WFT_API_URL missing"; exit 1 }
          Write-Host "remote MCP entry present and well-formed"

      - name: Assert secret file exists (remote)
        shell: pwsh
        run: |
          $secret = Join-Path $env:LOCALAPPDATA 'wood-fired-tasks\api-key'
          if (-not (Test-Path $secret)) { Write-Error "secret file missing: $secret"; exit 1 }
          $content = Get-Content $secret -Raw
          if ([string]::IsNullOrWhiteSpace($content)) { Write-Error "secret file empty"; exit 1 }
          Write-Host "secret file present: $secret"

  # -------------------------------------------------------------------------
  # Regression smoke for the globally-linked `tasks` CLI.
  #
  # Background: wood-fired-tasks #334 fixed a silent-CLI bug where the
  # `npm link`-ed `tasks` binary produced NO output because the entry guard
  # `import.meta.url === \`file://${process.argv[1]}\`` did not match when
  # Node resolved process.argv[1] through the link's symlink. The fix routes
  # through src/utils/is-main.ts, which realpath's both sides.
  #
  # This job is the regression gate — task #335. If a future revert of #334's
  # fix lands, `tasks --version` will produce empty output and this smoke
  # fails within seconds. The smoke logic itself lives in
  # tests/smoke/cli-symlink-smoke.sh so it can be re-run from a fresh
  # checkout (`bash tests/smoke/cli-symlink-smoke.sh`) without going through
  # CI. Branch protection wires onto this job's exact name (cli-smoke-link)
  # via task #340 — do not rename without updating that ruleset.
  #
  # Windows is intentionally out of scope here: npm link uses junction points
  # on Windows rather than POSIX symlinks, which exercises a different code
  # path. That coverage is task #338 (tarball install) / #339 (Windows-native
  # smoke). The bug we are gating against is the symlink path specifically.
  # -------------------------------------------------------------------------
  cli-smoke-link:
    name: cli-smoke-link
    needs: smoke-unix
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build dist artifacts (CLI bin lives at dist/cli/bin/tasks.js)
        run: |
          npm run build
          test -f dist/cli/bin/tasks.js || { echo "build did not produce dist/cli/bin/tasks.js"; exit 1; }

      - name: Run cli-symlink-smoke.sh
        # The script does its own `npm link`, cleans up on exit, and asserts:
        #   1. `tasks --version` equals package.json's version
        #   2. `tasks --help` exits 0 with >= 10 lines
        #   3. `tasks` (no args) exits != 0 and stderr contains "Usage:"
        run: bash tests/smoke/cli-symlink-smoke.sh

  # -------------------------------------------------------------------------
  # Per-command surface coverage matrix — wood-fired-tasks #337.
  #
  # Where cli-smoke-link covers the top-level binary (--version / --help /
  # no-args), this job extends coverage DOWN to every individual Commander
  # subcommand. The script (tests/smoke/cli-surface-coverage.sh) discovers
  # the registered command list dynamically by parsing `tasks --help`, so
  # any future addCommand() call automatically lands in the matrix without
  # a CI edit. For each command (and one level of nesting where applicable,
  # e.g. `tasks db mint-token`), it asserts that `tasks <cmd> --help`
  # exits 0, produces non-empty stdout, and begins with the literal
  # "Usage: tasks <cmd>" line — proof that Commander rendered the help
  # and the CLI did not silent-no-op (the same regression family as #334).
  #
  # Node matrix: package.json's engines.node is ">=22" and Node 22 is the
  # active LTS line at the time of writing (24 is Current, not LTS). So
  # "minimum supported" and "latest LTS" collapse to the same number; the
  # matrix is a single-entry [22] for now. The matrix syntax is preserved
  # so a future LTS bump is a one-line edit. Branch protection (task #340)
  # wires onto the job key `cli-surface-coverage-link`; do not rename it
  # without updating that ruleset.
  # -------------------------------------------------------------------------
  cli-surface-coverage-link:
    name: cli-surface-coverage-link (node ${{ matrix.node-version }})
    needs: cli-smoke-link
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build dist artifacts (CLI bin lives at dist/cli/bin/tasks.js)
        run: |
          npm run build
          test -f dist/cli/bin/tasks.js || { echo "build did not produce dist/cli/bin/tasks.js"; exit 1; }

      - name: Run cli-surface-coverage.sh
        # The script does its own `npm link`, cleans up on exit, parses
        # `tasks --help` to discover commands, recurses one level on any
        # command that exposes a nested Commands: block, and asserts on
        # every command:
        #   - exit code == 0
        #   - stdout non-empty
        #   - stdout contains "Usage: tasks <cmd>"
        # It continues past failures and exits non-zero with a list of
        # failing commands (so we see ALL regressions in one run, not just
        # the first). Total runtime target <= 90s per Node version.
        run: bash tests/smoke/cli-surface-coverage.sh

  # -------------------------------------------------------------------------
  # Tarball-install gate — wood-fired-tasks #338.
  #
  # The two preceding CLI gates (#335 cli-smoke-link, #337
  # cli-surface-coverage-link) both run against `npm link`, which symlinks
  # the WHOLE working tree into global node_modules. Anything missing from
  # package.json's `files` array still resolves through that link, so a
  # packaging gap (e.g. a freshly-added dist file the include globs don't
  # pick up) passes both gates yet breaks for real users who install from
  # the published tarball.
  #
  # This job closes that gap: it runs `npm pack` to produce the exact
  # tarball that would land on npmjs.com, installs it into a clean
  # tmpdir via `npm install --omit=dev`, prepends THAT tmpdir's .bin to
  # PATH, asserts via realpath that `tasks` resolves under the packaged
  # node_modules/<pkg>/dist/ (not a stale link or the dev tree), and then
  # re-runs the same #335 + #337-style assertions against the packaged
  # binary. Branch protection (task #340) wires onto the job key
  # `cli-tarball-install`; do not rename it without updating that ruleset.
  #
  # Runs after the npm-link variants so a packaging-only failure surfaces
  # after we've confirmed the link install itself is healthy. macOS /
  # windows coverage is intentionally out of scope — `npm pack` is
  # platform-agnostic; #339 will add a Windows-native smoke separately.
  # -------------------------------------------------------------------------
  cli-tarball-install:
    name: cli-tarball-install
    needs: cli-surface-coverage-link
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build dist artifacts (CLI bin lives at dist/cli/bin/tasks.js)
        run: |
          npm run build
          test -f dist/cli/bin/tasks.js || { echo "build did not produce dist/cli/bin/tasks.js"; exit 1; }

      - name: Run cli-tarball-install.sh
        # The script:
        #   1. `npm pack` → wood-fired-tasks-X.Y.Z.tgz at repo root
        #   2. `npm install --prefix <tmp> --omit=dev <tarball>`
        #   3. Prepend <tmp>/node_modules/.bin to PATH; assert realpath of
        #      `tasks` lives under <tmp>/node_modules/<pkg>/dist/
        #   4. Re-run #335-style smoke (--version, --help, no-args) +
        #      #337-style per-command --help matrix against the packaged
        #      binary (nested recursion is intentionally skipped — already
        #      covered against the link install by #337)
        #   5. Cleanup trap removes BOTH the tmpdir AND the tarball on exit
        # Local wall time ~10s; well under the 2-min AC budget.
        run: bash tests/smoke/cli-tarball-install.sh

  # -------------------------------------------------------------------------
  # End-to-end CLI functional gate — wood-fired-tasks #339.
  #
  # The four preceding gates (cli-smoke-link / cli-surface-coverage-link /
  # cli-tarball-install) all validate the CLI's SURFACE — that --version,
  # --help, and per-command --help render correctly across the link + tarball
  # install shapes. None of them prove a command actually mutates server
  # state. A regression of the class "tasks create silently no-ops but
  # prints success" would pass all three.
  #
  # This job closes that gap with a real round-trip:
  #   1. Pack + install the published tarball (same as #338).
  #   2. Start the REST API server (from the tarball install) in the
  #      background, pointed at an ephemeral SQLite DB.
  #   3. Mint a PAT via `tasks db mint-token` against the same DB.
  #   4. Run the CLI command matrix (project-create → create → list →
  #      show → update → comment → dep → topology → delete → project-delete)
  #      using --token "$PAT", asserting on the JSON envelope at each step.
  #   5. Cross-check server state via direct SQLite reads at two key
  #      points (task count after create; status after update) — so a CLI
  #      that lies about success cannot fool the gate.
  #
  # The script enforces a cleanup trap that kills the server, removes the
  # temp DB + tarball + tmp dir on ANY exit (success or failure). A leaked
  # Node process on a CI runner would wedge the next job.
  #
  # Total runtime: ~10-15s locally, well under the 4-min AC budget.
  # -------------------------------------------------------------------------
  cli-e2e:
    name: cli-e2e
    needs: cli-tarball-install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Verify prerequisites
        # jq is pre-installed on ubuntu-latest runners; this is a sanity
        # check so a future image change that drops jq fails loud here
        # rather than mid-round-trip.
        run: |
          jq --version
          curl --version | head -1

      - name: Install dependencies
        run: npm ci

      - name: Build dist artifacts (server entry, CLI bin, migrations)
        run: |
          npm run build
          test -f dist/cli/bin/tasks.js || { echo "build did not produce dist/cli/bin/tasks.js"; exit 1; }
          test -f dist/api/start.js    || { echo "build did not produce dist/api/start.js"; exit 1; }

      - name: Run cli-e2e.sh
        # The script:
        #   1. `npm pack` → install into tmpdir; PATH-prepend its .bin
        #   2. Start `dist/api/start.js` in background; poll /health (≤30s)
        #   3. Mint a PAT; capture from stdout
        #   4. Run the 10-step round-trip (a-j per AC) using --token "$PAT"
        #   5. Direct-DB cross-checks via node + better-sqlite3 (no apt deps)
        #   6. Cleanup trap kills server + removes DB + tarball + tmp dir
        # Local wall time ~10s; well under the 4-min AC budget.
        run: bash tests/smoke/cli-e2e.sh
