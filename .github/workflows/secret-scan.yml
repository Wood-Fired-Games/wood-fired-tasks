name: Secret Scan & Artifact Hygiene

# task #256: pre-publication secret-scan + artifact hygiene gate.
#
# Two jobs:
#   1. gitleaks  - full-history scan on PR / push to main / weekly cron.
#                  Installs the gitleaks binary directly from upstream
#                  releases (verified by sha256) rather than the
#                  gitleaks-action, which now requires a paid license for
#                  org-owned repos. The CLI itself is MIT-licensed and free.
#                  Allowlist lives in .gitleaks.toml.
#   2. hygiene   - defensive check that nothing sensitive landed in tracked
#                  files (env files, .db artifacts, .pem / .key) and that
#                  npm pack --dry-run still produces a clean tarball.
#
# Both jobs must stay green on main before cutting an npm release.
#
# SECURITY NOTE: this workflow does not consume any untrusted user input
# (no issue titles, PR titles, commit messages, or comment bodies are
# interpolated into run: blocks). All shell commands operate on tracked
# repo content only.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly Monday 08:00 UTC.
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (history scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: '8.30.1'
          GITLEAKS_SHA256: '551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb'
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/gitleaks.tgz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tgz" | sha256sum -c -
          sudo tar -xzf /tmp/gitleaks.tgz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Run gitleaks (full history scan)
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --no-banner \
            --redact \
            --verbose \
            --report-format sarif \
            --report-path gitleaks-report.sarif
      - name: Upload gitleaks SARIF report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gitleaks-report
          path: gitleaks-report.sarif
          if-no-files-found: ignore

  hygiene:
    name: artifact hygiene (pack-check + sensitive-file audit)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      # publint resolves pkg.main / pkg.bin targets (dist/index.js,
      # dist/cli/bin/tasks.js, packages/wft-router/dist/bin/wft-router.js),
      # which only exist after a build. Build before pack:check or publint
      # errors "the file does not exist".
      - name: Build (tsc) so pack:check can resolve dist entry points
        run: npm run build

      - name: Fail if any tracked file matches sensitive patterns
        run: |
          set -euo pipefail
          MATCHES=$(git ls-files \
            | grep -E '(^|/)\.env(\..*)?$|(^|/)data/.*\.db$|\.pem$|\.key$' \
            | grep -vE '(^|/)\.env\.example$|(^|/)[^/]*\.env\.example$' || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Sensitive tracked files detected (task #256 hygiene gate):"
            echo "$MATCHES"
            exit 1
          fi
          echo "Tracked-file audit clean."

      - name: npm pack --dry-run (verify published tarball contents)
        run: npm run pack:check
