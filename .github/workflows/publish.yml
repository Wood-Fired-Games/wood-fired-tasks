name: Publish

# Publishes the package to npm via OIDC Trusted Publishing — no long-lived
# NPM_TOKEN secret exists in this repo. npm exchanges the GitHub-issued OIDC
# token for short-lived credentials at publish time and attaches provenance
# automatically. Configure the trusted publisher on npmjs.com (package →
# Settings → Trusted Publisher) with:
#   Organization or user: Wood-Fired-Games
#   Repository:           wood-fired-tasks
#   Workflow filename:    publish.yml
#   Allowed actions:      npm publish
#
# Trigger: pushing a vX.Y tag (the release convention), or manual dispatch.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Least privilege: read the checkout, and mint an OIDC token for npm. No
# write scope on the repo itself.
permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
      # OIDC trusted publishing requires npm >= 11.5.1; Node 22 still ships
      # npm 10.x, so upgrade before publishing.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest
      - run: npm ci
      # prepublishOnly gates this: build + test + lint:deps + audit + pack-check.
      # No NODE_AUTH_TOKEN — npm detects the OIDC environment and generates
      # provenance on its own.
      - name: Publish to npm
        run: npm publish
