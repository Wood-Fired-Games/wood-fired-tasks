name: Mutation Testing

on:
  # Nightly schedule re-enabled (task #252) after sharding the workflow across
  # parallel jobs. Pre-sharding, a full run was ~6h09m which exceeded the 6h
  # GH Actions ceiling on default runners; sharded runs target ~1h30m–2h per
  # shard with all shards running in parallel. The api/mcp split (5 shards)
  # followed after the combined api-mcp shard hit the 300-min ceiling.
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read

# Cancel superseded runs on the same ref to save runner minutes when a new
# commit lands or the workflow is re-dispatched.
concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shard:
    # Only run on PRs that carry the "mutation" label; always run on schedule
    # and manual dispatch.
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'mutation'))
    runs-on: ubuntu-latest
    # Each shard is a disjoint subset of src/ — see the matrix below for the
    # exact partitioning. Per-shard wall time is expected to be ~1h30m–2h on
    # the default runner (full unsharded run was ~6h09m for ~7000 mutants;
    # the 5-way shard divides the workload across cli / api / mcp /
    # services-db-repos / misc).
    timeout-minutes: 300
    strategy:
      # Don't kill sibling shards if one fails — we still want partial reports
      # for the aggregator and the HTML artifact upload.
      fail-fast: false
      matrix:
        shard:
          - id: 0
            name: cli
            globs: 'src/cli/**/*.ts'
          # shard-1 (api-mcp) was hitting the 300-min job ceiling on the nightly
          # (src/api + src/mcp combined exceeded ~5h). Split into two independent
          # shards so each fits the budget.
          - id: 1
            name: api
            globs: 'src/api/**/*.ts'
          - id: 2
            name: mcp
            globs: 'src/mcp/**/*.ts'
          - id: 3
            name: services-db-repos
            globs: 'src/services/**/*.ts src/db/**/*.ts src/repositories/**/*.ts'
          - id: 4
            name: misc
            globs: >-
              src/slack/**/*.ts
              src/schemas/**/*.ts
              src/events/**/*.ts
              src/utils/**/*.ts
              src/types/**/*.ts
              src/config/**/*.ts
              src/index.ts
    name: shard-${{ matrix.shard.id }}-${{ matrix.shard.name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run Stryker (shard ${{ matrix.shard.id }} / ${{ matrix.shard.name }})
        # Shard partitioning is driven by STRYKER_MUTATE_GLOBS — see
        # stryker.config.js. The CLI --mutate flag does NOT accumulate
        # (later --mutate overrides earlier ones), so passing per-shard
        # globs via env is the only reliable approach. Exclusions stay in
        # stryker.config.js.
        # --reporters json,clear-text,progress ensures a JSON report is
        # written at reports/mutation/mutation.json for the aggregator.
        # STRYKER_DISABLE_BREAK_THRESHOLD=1 tells stryker.config.js to skip
        # the per-shard break check (a single shard's score is meaningless;
        # the unified break is enforced by the aggregator job below).
        env:
          STRYKER_MUTATE_GLOBS: ${{ matrix.shard.globs }}
          STRYKER_DISABLE_BREAK_THRESHOLD: '1'
        run: |
          set -euo pipefail
          npx stryker run --reporters json,clear-text,progress
      - name: Upload shard JSON report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-shard-${{ matrix.shard.id }}-json
          path: reports/mutation/mutation.json
          if-no-files-found: error
          retention-days: 30
      - name: Upload shard HTML report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-shard-${{ matrix.shard.id }}-html
          path: reports/mutation/
          if-no-files-found: warn
          retention-days: 30

  aggregate:
    name: aggregate-and-enforce-threshold
    needs: shard
    if: always() && needs.shard.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Download all shard JSON reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: mutation-shard-*-json
          path: shard-reports/
      - name: List downloaded shard reports
        run: ls -lR shard-reports/
      - name: Aggregate shard reports and enforce 75% break threshold
        # pipefail is essential: without it the `tee` swallows a non-zero
        # exit from the aggregator and the workflow silently passes when
        # the unified score is below threshold.
        run: |
          set -euo pipefail
          mkdir -p reports/mutation
          npx tsx scripts/aggregate-mutation-reports.ts \
            --threshold 75 \
            --output reports/mutation/aggregate.json \
            shard-reports/*/mutation.json | tee reports/mutation/aggregate-summary.txt
      - name: Append summary to GitHub job summary
        if: always()
        run: |
          set -eu
          if [ -f reports/mutation/aggregate-summary.txt ]; then
            {
              echo '## Unified mutation score'
              echo ''
              echo '```'
              cat reports/mutation/aggregate-summary.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload aggregated report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-aggregate
          path: reports/mutation/
          if-no-files-found: warn
          retention-days: 30
