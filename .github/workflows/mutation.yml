name: Mutation Testing

on:
  # Schedule trigger is disabled: observed Stryker runtime is ~6h09m, which
  # exceeds the 6h hard ceiling for GH Actions default runners — every
  # nightly was getting cancelled at the timeout (see runs 26233837678,
  # 26247080933). Re-enable once the workflow is sharded across parallel
  # jobs. Tracking issue: see wood-fired-bugs follow-up task referenced in
  # task #250.
  # schedule:
  #   - cron: '0 6 * * *'
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

jobs:
  mutation:
    # Only run on PRs that carry the "mutation" label; always run on schedule
    # and manual dispatch.
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'mutation'))
    runs-on: ubuntu-latest
    # Stryker runs ~7000 mutants and takes ~6h09m wall time on the default
    # ubuntu-latest runner (observed 2026-05-21 runs 26233837678 and
    # 26247080933 — both cancelled at the 6h ceiling with 92-97% complete).
    # 360m is the GH Actions max for default runners. The only way to make
    # this fit is to shard the run across parallel jobs or reduce mutant
    # scope; the schedule trigger is disabled above until that lands.
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run Stryker mutation tests (fails when score < break threshold)
        run: npm run test:mutation
      - name: Upload mutation HTML report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mutation-report
          path: reports/mutation/
          if-no-files-found: warn
          retention-days: 30
